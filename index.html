<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fluxo — Controle Financeiro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/4.4.4/chart.umd.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="screen-login" class="center-screen">
  <div class="card preset-card">
    <div class="brand">Flu<span>xo</span></div>
    <div class="seg-toggle" style="margin-top:18px;">
      <button data-auth="login" class="active">Entrar</button>
      <button data-auth="cadastro">Criar conta</button>
    </div>
    <div class="field"><label>E-mail</label><input id="auth-email" type="email" autocomplete="email"></div>
    <div class="field"><label>Senha</label><input id="auth-password" type="password" autocomplete="current-password"></div>
    <div class="tx-error" id="auth-error"></div>
    <button class="btn btn-primary btn-block" id="btn-auth-submit">Entrar</button>
  </div>
</div>

<div id="screen-app" class="hidden">
  <div id="app">
    <div class="center-screen"><div class="muted">Carregando seus dados…</div></div>
  </div>
</div>

<input type="file" id="import-file-input" accept=".csv,.ofx" class="hidden">

<script type="module" src="script.js"></script>
</body>
</html>
